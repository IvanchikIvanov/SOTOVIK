<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;padding:20px;font-family:'Inter',sans-serif}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cat{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;cursor:pointer;transition:border-color 200ms,background 200ms;position:relative;overflow:hidden}
.cat:hover{background:#1a1a1a;border-color:#3a3a3a}
.icon{font-size:28px;margin-bottom:10px;display:block}
.name{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:#fff;line-height:1.3}
.count{font-size:11px;color:#505050;margin-top:3px}
.cat-active{background:#141414;border-color:rgba(217,60,175,.5);box-shadow:0 0 0 1px rgba(217,60,175,.2) inset}
.cat-active .name{color:#d93caf}
</style></head><body>
<div class="grid">
  <div class="cat cat-active"><span class="icon">📱</span><div class="name">Смартфоны</div><div class="count">342 товара</div></div>
  <div class="cat"><span class="icon">📟</span><div class="name">Планшеты</div><div class="count">98 товаров</div></div>
  <div class="cat"><span class="icon">💻</span><div class="name">Компьютеры</div><div class="count">215 товаров</div></div>
  <div class="cat"><span class="icon">⌚</span><div class="name">Умные часы</div><div class="count">76 товаров</div></div>
  <div class="cat"><span class="icon">🎧</span><div class="name">Наушники</div><div class="count">134 товара</div></div>
  <div class="cat"><span class="icon">🎮</span><div class="name">Игровые приставки</div><div class="count">43 товара</div></div>
  <div class="cat"><span class="icon">🏠</span><div class="name">Техника для дома</div><div class="count">189 товаров</div></div>
  <div class="cat"><span class="icon">🔌</span><div class="name">Аксессуары</div><div class="count">521 товар</div></div>
</div>
</body></html>
