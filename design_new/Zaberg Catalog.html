  { id:2,  catId:'Смартфоны',  brand:'Samsung', category:'Смартфон', name:'Zaberg Aurum X1 Pro',  sub:'Titanium Series',      price:'179 900', oldPrice:null,       tag:'Камера 200 Мп', specs:['6.7″ OLED 144Hz','Snapdragon 8 Gen 3','512 GB / 16 GB','200 Мп'],       colors:['#F5F0EA','#1A1A1A','#8B7355'],  inStock:true  },
  { id:3,  catId:'Смартфоны',  brand:'Xiaomi',  category:'Смартфон', name:'Zaberg Lux S',         sub:'Slim Edition',         price:'89 900',  oldPrice:null,       tag:null,            specs:['6.1″ AMOLED 90Hz','Helio G99 Ultra','128 GB / 8 GB','6.2 мм'],         colors:['#E8E0D0','#4A4A4A'],            inStock:true  },
  { id:4,  catId:'Планшеты',   brand:'Apple',   category:'Планшет',  name:'Zaberg Pad Elite',     sub:'Creator Series',       price:'129 900', oldPrice:null,       tag:'Хит',           specs:['12.4″ LTPO IPS','Snapdragon 8cx','256 GB / 12 GB','Стилус'],           colors:['#B8C4C0','#2C2C2C','#C8B8A2'], inStock:true  },
  { id:5,  catId:'Планшеты',   brand:'Apple',   category:'Планшет',  name:'Zaberg Pad Elite Pro', sub:'Creator Series',       price:'189 900', oldPrice:null,       tag:'Pro',           specs:['13.0″ OLED 144Hz','Snapdragon 8cx','512 GB / 16 GB','Клавиатура'],     colors:['#F0EDE8','#1C1C1C'],            inStock:false },
  { id:6,  catId:'Смартфоны',  brand:'Honor',   category:'Смартфон', name:'Zaberg Nova 9',        sub:'Everyday Excellence',  price:'59 900',  oldPrice:null,       tag:null,            specs:['6.4″ AMOLED 120Hz','Dimensity 9200','128 GB / 8 GB','67W'],            colors:['#C4D4D0','#6B5B4E','#E8E4DC'],  inStock:true  },
  { id:7,  catId:'Смартфоны',  brand:'Honor',   category:'Смартфон', name:'Zaberg Nova 9+',       sub:'Everyday Excellence',  price:'74 900',  oldPrice:null,       tag:'Выгода',        specs:['6.6″ AMOLED 120Hz','Dimensity 9200+','256 GB / 12 GB','5000 мАч'],    colors:['#D4C8B8','#2C2C2C'],            inStock:true  },
  { id:8,  catId:'Планшеты',   brand:'Google',  category:'Планшет',  name:'Zaberg Pad Note',      sub:'Business Line',        price:'79 900',  oldPrice:null,       tag:null,            specs:['10.9″ IPS 90Hz','Snapdragon 7s Gen 3','128 GB / 8 GB','LTE + Wi-Fi 6'],colors:['#E0D8C8','#3C3C3C','#A8B4B0'], inStock:true  },
  { id:9,  catId:'Смартфоны',  brand:'Realme',  category:'Смартфон', name:'Zaberg Fold Z',        sub:'Flip Edition',         price:'219 900', oldPrice:null,       tag:'Эксклюзив',     specs:['Складной 7.6″ OLED','Snapdragon 8 Gen 3','512 GB / 16 GB','Перламутр'],colors:['#D4C0A8','#1A1A1A','#B0B8C4'], inStock:true  },
  { id:10, catId:'Планшеты',   brand:'Xiaomi',  category:'Планшет',  name:'Zaberg Pad Mini',      sub:'Compact Series',       price:'44 900',  oldPrice:null,       tag:null,            specs:['8.7″ IPS 60Hz','Helio G99','64 GB / 6 GB','360 г'],                    colors:['#F0EBE0','#4A4A4A'],            inStock:true  },
  { id:11, catId:'Смартфоны',  brand:'Google',  category:'Смартфон', name:'Zaberg Aurum X2',      sub:'Titanium Series',      price:'159 900', oldPrice:null,       tag:'2025',          specs:['6.8″ OLED 144Hz','Snapdragon 8 Elite','256 GB / 12 GB','Wi-Fi 7 + 5G'],colors:['#C0B4A4','#222222','#7A8A94'], inStock:false },
  { id:12, catId:'Планшеты',   brand:'Apple',   category:'Планшет',  name:'Zaberg Pad Ultra',     sub:'Professional',         price:'269 900', oldPrice:null,       tag:'Ultra',         specs:['14.6″ OLED 120Hz','Snapdragon 8cx','1 TB / 16 GB','Nano-SIM + eSIM'],  colors:['#E8E2D8','#1A1A1A'],            inStock:true  },

/* ─── ColorDot ─── */
function ColorDot({ color, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      width:13, height:13, borderRadius:'50%', background:color, flexShrink:0,
      border: active ? '2px solid oklch(20% 0.01 65)' : '1.5px solid oklch(82% 0.01 65)',
      outline:'none', cursor:'pointer',
      transform: active ? 'scale(1.25)' : 'scale(1)',
      transition:'transform 0.15s',
    }}/>
  );
}

/* ─── ProductCard ─── */
function ProductCard({ product, accent, onOpen, isTablet }) {
  const [hov, setHov] = useState(false);
  const [selColor, setSelColor] = useState(0);
  const isTab = product.category === 'Планшет';

  return (
    <article
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      onClick={() => onOpen(product)}
      style={{
        background: 'oklch(99.2% 0.003 65)',
        borderRadius:6, overflow:'hidden', cursor:'pointer',
        display:'flex', flexDirection:'column',
        transition:'box-shadow 0.3s, transform 0.3s',
        boxShadow: hov
          ? '0 12px 40px oklch(18% 0.01 65 / 0.13), 0 2px 8px oklch(18% 0.01 65 / 0.05)'
          : '0 1px 3px oklch(18% 0.01 65 / 0.07)',
        transform: hov ? 'translateY(-3px)' : 'none',
      }}
    >
      {/* Image zone */}
      <div style={{
        position:'relative', aspectRatio:'1/1',
        background:'linear-gradient(145deg, oklch(94% 0.01 65), oklch(97.5% 0.005 65))',
        display:'flex', alignItems:'center', justifyContent:'center',
      }}>
        {product.tag && (
          <span style={{
            position:'absolute', top:12, left:12,
            fontSize:9.5, fontWeight:500, letterSpacing:'0.09em', textTransform:'uppercase',
            color:'#fff', background:accent, padding:'3px 9px', borderRadius:2,
          }}>{product.tag}</span>
        )}
        {!product.inStock && (
          <span style={{
            position:'absolute', top:12, right:12,
            fontSize:9.5, letterSpacing:'0.06em', textTransform:'uppercase',
            color:'oklch(50% 0.01 65)', background:'oklch(91% 0.008 65)',
            padding:'3px 9px', borderRadius:2,
          }}>Нет в наличии</span>
        )}
        <svg width={isTab ? 100 : 68} height={isTab ? 70 : 120} viewBox="0 0 80 140" fill="none" style={{opacity:0.22}}>
          {isTab ? (
            <>
              <rect x="6" y="22" width="68" height="96" rx="5" stroke="oklch(22% 0.01 65)" strokeWidth="3" transform="rotate(-90 40 70)"/>
              <rect x="14" y="34" width="52" height="72" rx="2" fill="oklch(22% 0.01 65)" fillOpacity="0.14" transform="rotate(-90 40 70)"/>
            </>
          ) : (
            <>
              <rect x="18" y="6" width="44" height="88" rx="7" stroke="oklch(22% 0.01 65)" strokeWidth="2.5"/>
              <rect x="24" y="20" width="32" height="58" rx="2" fill="oklch(22% 0.01 65)" fillOpacity="0.14"/>
              <circle cx="40" cy="106" r="5" stroke="oklch(22% 0.01 65)" strokeWidth="2"/>
              <rect x="33" y="11" width="14" height="3" rx="1.5" fill="oklch(22% 0.01 65)" fillOpacity="0.4"/>
            </>
          )}
        </svg>

        {/* Brand chip */}
        <span style={{
          position:'absolute', bottom:12, right:12,
          fontSize:9, letterSpacing:'0.08em', textTransform:'uppercase',
          color:'oklch(52% 0.01 65)', background:'oklch(99% 0.003 65 / 0.9)',
          padding:'3px 8px', borderRadius:2, border:'1px solid oklch(88% 0.006 65)',
        }}>{product.brand}</span>
      </div>

      {/* Info */}
      <div style={{ padding:'16px 18px 18px', display:'flex', flexDirection:'column', gap:9, flex:1 }}>
        <div>
          <div style={{ fontSize:10.5, letterSpacing:'0.09em', textTransform:'uppercase', color:'oklch(58% 0.01 65)', marginBottom:4 }}>
            {product.category}
          </div>
          <div style={{ fontSize:15, fontFamily:"'Cormorant Garamond', serif", fontWeight:500, lineHeight:1.25 }}>
            {product.name}
          </div>
        </div>

        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
          {product.specs.slice(0,2).map((s,i) => (
            <span key={i} style={{
              fontSize:10.5, color:'oklch(46% 0.01 65)',
              background:'oklch(93.5% 0.006 65)',
              padding:'2px 7px', borderRadius:2, whiteSpace:'nowrap',
            }}>{s}</span>
          ))}
        </div>

        <div style={{ display:'flex', gap:5 }}>
          {product.colors.map((c,i) => (
            <ColorDot key={i} color={c} active={selColor===i}
              onClick={e => { e.stopPropagation(); setSelColor(i); }} />
          ))}
        </div>

        <div style={{ marginTop:'auto', paddingTop:4, display:'flex', alignItems:'baseline', gap:8 }}>
          <span style={{ fontSize:17, fontFamily:"'Cormorant Garamond', serif", fontWeight:500, letterSpacing:'-0.01em' }}>
            {product.price} ₽
          </span>
          {product.oldPrice && (
            <span style={{ fontSize:12, color:'oklch(60% 0.01 65)', textDecoration:'line-through' }}>
              {product.oldPrice} ₽
            </span>
          )}
        </div>
      </div>
    </article>
  );
}

/* ─── Modal ─── */
function Modal({ product, accent, onClose }) {
  const [selColor, setSelColor] = useState(0);
  const overlayRef = useRef();
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  const isTab = product.category === 'Планшет';

  return (
    <div ref={overlayRef} onClick={e => e.target===overlayRef.current && onClose()} style={{
      position:'fixed', inset:0, zIndex:300,
      background:'oklch(10% 0.01 65 / 0.5)', backdropFilter:'blur(8px)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:24,
      animation:'fadeIn 0.2s ease',
    }}>
      <div style={{
        background:'oklch(99% 0.004 65)', borderRadius:8,
        maxWidth:780, width:'100%', maxHeight:'90vh', overflow:'auto',
        display:'grid', gridTemplateColumns:'1fr 1fr',
        position:'relative', animation:'slideUp 0.28s ease',
      }}>
        <button onClick={onClose} style={{
          position:'absolute', top:16, right:16, zIndex:1,
          background:'oklch(92% 0.008 65)', border:'none', borderRadius:'50%',
          width:32, height:32, cursor:'pointer', fontSize:14,
          color:'oklch(40% 0.01 65)', display:'flex', alignItems:'center', justifyContent:'center',
        }}>✕</button>

        <div style={{
          background:'linear-gradient(145deg, oklch(93% 0.012 65), oklch(97% 0.005 65))',
          display:'flex', alignItems:'center', justifyContent:'center', minHeight:360, padding:48,
        }}>
          <svg width={isTab?160:110} height={isTab?110:190} viewBox="0 0 80 140" fill="none" style={{opacity:0.26}}>
            {isTab ? (
              <>
                <rect x="6" y="22" width="68" height="96" rx="5" stroke="oklch(20% 0.01 65)" strokeWidth="2.5" transform="rotate(-90 40 70)"/>
                <rect x="14" y="34" width="52" height="72" rx="2" fill="oklch(20% 0.01 65)" fillOpacity="0.15" transform="rotate(-90 40 70)"/>
              </>
            ) : (
              <>
                <rect x="18" y="6" width="44" height="88" rx="7" stroke="oklch(20% 0.01 65)" strokeWidth="2.5"/>
                <rect x="24" y="20" width="32" height="58" rx="2" fill="oklch(20% 0.01 65)" fillOpacity="0.15"/>
                <circle cx="40" cy="106" r="5" stroke="oklch(20% 0.01 65)" strokeWidth="2"/>
                <rect x="33" y="11" width="14" height="3" rx="1.5" fill="oklch(20% 0.01 65)" fillOpacity="0.5"/>
              </>
            )}
          </svg>
        </div>

        <div style={{ padding:'40px 36px', display:'flex', flexDirection:'column', gap:18 }}>
          <div>
            <div style={{ fontSize:10.5, letterSpacing:'0.1em', textTransform:'uppercase', color:'oklch(56% 0.01 65)', marginBottom:6 }}>
              {product.category} · {product.sub} · {product.brand}
            </div>
            <h2 style={{ fontFamily:"'Cormorant Garamond', serif", fontWeight:400, fontSize:28, lineHeight:1.15 }}>
              {product.name}
            </h2>
          </div>

          <div>
            <div style={{ fontSize:10.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'oklch(56% 0.01 65)', marginBottom:10 }}>Характеристики</div>
            {product.specs.map((s,i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:10, fontSize:13, color:'oklch(28% 0.01 65)', marginBottom:8 }}>
                <div style={{ width:4, height:4, borderRadius:'50%', background:accent, flexShrink:0 }}/>
                {s}
              </div>
            ))}
          </div>

          <div>
            <div style={{ fontSize:10.5, letterSpacing:'0.08em', textTransform:'uppercase', color:'oklch(56% 0.01 65)', marginBottom:10 }}>Цвет</div>
            <div style={{ display:'flex', gap:8 }}>
              {product.colors.map((c,i) => (
                <ColorDot key={i} color={c} active={selColor===i} onClick={() => setSelColor(i)} />
              ))}
            </div>
          </div>

          <div style={{ borderTop:'1px solid oklch(90% 0.006 65)', paddingTop:18 }}>
            <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:14 }}>
              <span style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:30, fontWeight:500, letterSpacing:'-0.02em' }}>
                {product.price} ₽
              </span>
              {product.oldPrice && (
                <span style={{ fontSize:14, color:'oklch(60% 0.01 65)', textDecoration:'line-through' }}>{product.oldPrice} ₽</span>
              )}
            </div>
            <button
              disabled={!product.inStock}
              style={{
                width:'100%', border:'none', borderRadius:3,
                padding:'12px 24px', fontSize:12,
                fontFamily:"'DM Sans', sans-serif", fontWeight:500,
                letterSpacing:'0.07em', textTransform:'uppercase',
                cursor: product.inStock ? 'pointer' : 'default',
                background: product.inStock ? accent : 'oklch(91% 0.008 65)',
                color: product.inStock ? '#fff' : 'oklch(55% 0.01 65)',
                transition:'opacity 0.2s',
              }}
              onMouseEnter={e => product.inStock && (e.target.style.opacity='0.85')}
              onMouseLeave={e => product.inStock && (e.target.style.opacity='1')}
            >
              {product.inStock ? 'Добавить в корзину' : 'Нет в наличии'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Sidebar ─── */
function Sidebar({ activeCategory, onCategory, activeBrands, onBrand, accent, headingFont }) {
  return (
    <aside style={{
      width: 220, flexShrink:0,
      background:'oklch(99.2% 0.003 65)',
      borderRight:'1px solid oklch(89% 0.008 65)',
      height:'calc(100vh - 60px)', position:'sticky', top:60,
      overflowY:'auto', paddingBottom:32,
    }}>
      {/* Categories */}
      <div style={{ padding:'24px 0 8px' }}>
        <div style={{
          fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
          color:'oklch(60% 0.01 65)', padding:'0 20px', marginBottom:6,
        }}>Категории</div>
        {CATEGORIES.map(cat => {
          const isActive = activeCategory === cat.id;
          return (
            <button key={cat.id} onClick={() => onCategory(cat.id)} style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              width:'100%', padding:'9px 20px',
              background: isActive ? `oklch(from ${accent} l c h / 0.08)` : 'none',
              border:'none', cursor:'pointer', textAlign:'left',
              borderLeft: isActive ? `3px solid ${accent}` : '3px solid transparent',
              transition:'background 0.15s',
            }}>
              <span style={{
                fontSize:13.5,
                fontWeight: isActive ? 500 : 400,
                color: isActive ? 'oklch(18% 0.01 65)' : 'oklch(32% 0.01 65)',
                fontFamily:"'DM Sans', sans-serif",
              }}>{cat.label}</span>
              {cat.count > 0 && (
                <span style={{
                  fontSize:10.5, color: isActive ? accent : 'oklch(65% 0.01 65)',
                  background: isActive ? `oklch(from ${accent} l c h / 0.12)` : 'oklch(92% 0.006 65)',
                  padding:'1px 6px', borderRadius:10,
                }}>{cat.count}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* Divider */}
      <div style={{ height:1, background:'oklch(89% 0.008 65)', margin:'12px 20px' }} />

      {/* Brands */}
      <div style={{ padding:'4px 0' }}>
        <div style={{
          fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
          color:'oklch(60% 0.01 65)', padding:'0 20px', marginBottom:6,
        }}>Бренды</div>
        {BRANDS.map(brand => {
          const isActive = activeBrands.includes(brand);
          return (
            <button key={brand} onClick={() => onBrand(brand)} style={{
              display:'flex', alignItems:'center', gap:10,
              width:'100%', padding:'8px 20px',
              background:'none', border:'none', cursor:'pointer', textAlign:'left',
              transition:'background 0.15s',
            }}
            onMouseEnter={e => e.currentTarget.style.background='oklch(94% 0.006 65)'}
            onMouseLeave={e => e.currentTarget.style.background='none'}
            >
              {/* Checkbox */}
              <span style={{
                width:14, height:14, borderRadius:3, flexShrink:0,
                border: isActive ? `2px solid ${accent}` : '1.5px solid oklch(78% 0.01 65)',
                background: isActive ? accent : 'transparent',
                display:'flex', alignItems:'center', justifyContent:'center',
                transition:'all 0.15s',
              }}>
                {isActive && <span style={{ color:'#fff', fontSize:9, lineHeight:1 }}>✓</span>}
              </span>
              <span style={{
                fontSize:13, color:'oklch(30% 0.01 65)',
                fontWeight: isActive ? 500 : 400,
              }}>{brand}</span>
            </button>
          );
        })}
      </div>
    </aside>
  );
}

/* ─── TweaksPanel ─── */
function TweaksPanel({ tweaks, onChange }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  const set = (key, val) => {
    const next = { ...tweaks, [key]: val };
    onChange(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };
  if (!open) return null;
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, zIndex:999,
      background:'oklch(99% 0.004 65)', borderRadius:6,
      boxShadow:'0 8px 40px oklch(18% 0.01 65 / 0.14)',
      padding:22, width:230, fontFamily:"'DM Sans', sans-serif",
    }}>
      <div style={{ fontSize:11, letterSpacing:'0.09em', textTransform:'uppercase', color:'oklch(55% 0.01 65)', marginBottom:16 }}>Tweaks</div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:'oklch(42% 0.01 65)', marginBottom:8 }}>Акцентный цвет</div>
        {[
          { label:'Золото',    val:'oklch(58% 0.10 70)'  },
          { label:'Шифер',     val:'oklch(40% 0.04 230)' },
          { label:'Терракота', val:'oklch(52% 0.12 30)'  },
          { label:'Мох',       val:'oklch(48% 0.09 145)' },
        ].map(o => (
          <button key={o.val} onClick={() => set('accentColor', o.val)} style={{
            display:'flex', alignItems:'center', gap:8,
            width:'100%', textAlign:'left',
            background: tweaks.accentColor===o.val ? 'oklch(93% 0.006 65)' : 'none',
            border:'none', borderRadius:3, padding:'5px 8px',
            fontSize:12.5, cursor:'pointer', color:'oklch(25% 0.01 65)',
          }}>
            <span style={{ width:11, height:11, borderRadius:'50%', background:o.val, display:'inline-block', flexShrink:0 }}/>
            {o.label}
          </button>
        ))}
      </div>
      <div>
        <div style={{ fontSize:11, color:'oklch(42% 0.01 65)', marginBottom:8 }}>Шрифт</div>
        {[{label:'Серифный',val:'serif'},{label:'Гротеск',val:'sans'}].map(o => (
          <button key={o.val} onClick={() => set('fontStyle', o.val)} style={{
            display:'block', width:'100%', textAlign:'left',
            background: tweaks.fontStyle===o.val ? 'oklch(93% 0.006 65)' : 'none',
            border:'none', borderRadius:3, padding:'5px 8px',
            fontSize:12.5, cursor:'pointer', color:'oklch(25% 0.01 65)',
          }}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [activeCategory, setActiveCategory] = useState('Смартфоны');
  const [activeBrands, setActiveBrands] = useState([]);
  const [modal, setModal] = useState(null);
  const accent = tweaks.accentColor;
  const headingFont = tweaks.fontStyle === 'serif'
    ? "'Cormorant Garamond', serif" : "'DM Sans', sans-serif";

  const catMap = { 'Смартфоны':'Смартфон','Планшеты':'Планшет','Аксессуары':'Аксессуар' };

  const filtered = PRODUCTS.filter(p => {
    const catMatch = catMap[activeCategory] ? p.category === catMap[activeCategory] : false;
    const brandMatch = activeBrands.length === 0 || activeBrands.includes(p.brand);
    return catMatch && brandMatch;
  });

  const toggleBrand = brand =>
    setActiveBrands(prev => prev.includes(brand) ? prev.filter(b=>b!==brand) : [...prev, brand]);

  const catLabel = activeCategory;

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <header style={{
        height:60, background:'oklch(99.2% 0.003 65)',
        borderBottom:'1px solid oklch(89% 0.008 65)',
        position:'sticky', top:0, zIndex:200,
        display:'flex', alignItems:'center',
        padding:'0 28px', gap:32,
      }}>
        <div style={{
          fontFamily: headingFont,
          fontSize: tweaks.fontStyle==='serif' ? 26 : 20,
          fontWeight: tweaks.fontStyle==='serif' ? 400 : 300,
          letterSpacing: tweaks.fontStyle==='serif' ? '0.06em' : '0.2em',
          textTransform:'uppercase', color:'oklch(18% 0.01 65)',
          flex:'0 0 auto',
        }}>Zaberg</div>

        {/* Breadcrumb */}
        <div style={{ display:'flex', alignItems:'center', gap:8, flex:1 }}>
          <span style={{ fontSize:12, color:'oklch(60% 0.01 65)' }}>Каталог</span>
          <span style={{ fontSize:12, color:'oklch(75% 0.01 65)' }}>›</span>
          <span style={{ fontSize:12, color:'oklch(25% 0.01 65)', fontWeight:500 }}>{catLabel}</span>
        </div>

        <div style={{ fontSize:12, color:'oklch(58% 0.01 65)', letterSpacing:'0.03em' }}>
          {filtered.length} {['товар','товара','товаров'][[1,2,3,4].includes(filtered.length % 10) && ![11,12,13,14].includes(filtered.length % 100) ? filtered.length % 10 === 1 ? 0 : 1 : 2]}
        </div>
      </header>

      <div style={{ display:'flex', flex:1 }}>
        <Sidebar
          activeCategory={activeCategory}
          onCategory={cat => { setActiveCategory(cat); setActiveBrands([]); }}
          activeBrands={activeBrands}
          onBrand={toggleBrand}
          accent={accent}
          headingFont={headingFont}
        />

        {/* Main content */}
        <main style={{ flex:1, padding:'28px 32px 60px', overflowY:'auto' }}>
          {/* Section title */}
          <div style={{ marginBottom:24 }}>
            <h1 style={{
              fontFamily: headingFont,
              fontSize: tweaks.fontStyle==='serif' ? 38 : 28,
              fontWeight: tweaks.fontStyle==='serif' ? 300 : 300,
              lineHeight:1.1, color:'oklch(16% 0.01 65)',
              letterSpacing: tweaks.fontStyle==='serif' ? '-0.01em' : '-0.02em',
            }}>{catLabel}</h1>
            {activeBrands.length > 0 && (
              <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
                {activeBrands.map(b => (
                  <span key={b} onClick={() => toggleBrand(b)} style={{
                    fontSize:11, padding:'3px 10px', borderRadius:12,
                    background:`oklch(from ${accent} l c h / 0.1)`,
                    color: accent, cursor:'pointer', border:`1px solid oklch(from ${accent} l c h / 0.2)`,
                    display:'flex', alignItems:'center', gap:5,
                  }}>
                    {b} <span style={{fontSize:10}}>✕</span>
                  </span>
                ))}
                <button onClick={() => setActiveBrands([])} style={{
                  fontSize:11, padding:'3px 10px', borderRadius:12,
                  background:'none', border:'1px solid oklch(80% 0.01 65)',
                  color:'oklch(55% 0.01 65)', cursor:'pointer',
                }}>Сбросить</button>
              </div>
            )}
          </div>

          {filtered.length > 0 ? (
            <div style={{
              display:'grid',
              gridTemplateColumns:'repeat(auto-fill, minmax(210px, 1fr))',
              gap: tweaks.density === 'compact' ? 14 : 20,
            }}>
              {filtered.map(p => (
                <ProductCard key={p.id} product={p} accent={accent} onOpen={setModal} />
              ))}
            </div>
          ) : (
            <div style={{
              display:'flex', flexDirection:'column', alignItems:'center',
              justifyContent:'center', height:320, gap:12,
            }}>
              <div style={{ fontSize:42, opacity:0.2 }}>◻</div>
              <div style={{ fontSize:14, color:'oklch(55% 0.01 65)' }}>Товаров пока нет</div>
              <button onClick={() => setActiveBrands([])} style={{
                fontSize:12, color: accent, background:'none', border:'none', cursor:'pointer',
                textDecoration:'underline',
              }}>Сбросить фильтры</button>
            </div>
          )}
        </main>
      </div>

      {modal && <Modal product={modal} accent={accent} onClose={() => setModal(null)} />}
      <TweaksPanel tweaks={tweaks} onChange={setTweaks} />

      <style>{`
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideUp { from{transform:translateY(18px);opacity:0} to{transform:none;opacity:1} }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
