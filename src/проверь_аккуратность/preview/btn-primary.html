<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;padding:20px;font-family:'Inter',sans-serif}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.label{font-size:10px;font-weight:500;color:#505050;letter-spacing:.1em;text-transform:uppercase;width:100%;margin-bottom:4px}
/* Primary */
.btn-primary{background:#d93caf;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:-.01em}
.btn-primary:hover{background:#f060cc}
/* Secondary */
.btn-secondary{background:transparent;color:#fff;border:1px solid #3a3a3a;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer}
/* Ghost */
.btn-ghost{background:transparent;color:#a0a0a0;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer}
/* Small */
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
/* Large */
.btn-lg{padding:14px 28px;font-size:15px;border-radius:10px}
/* Outline accent */
.btn-outline{background:transparent;color:#d93caf;border:1px solid rgba(217,60,175,.4);border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer}
/* Blue */
.btn-blue{background:#3a6fd8;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
/* Disabled */
.btn-disabled{background:#1e1e1e;color:#505050;border:1px solid #2a2a2a;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:not-allowed}
</style></head><body>

<div class="row"><div class="label">Primary</div>
  <button class="btn-primary">Добавить в корзину</button>
  <button class="btn-primary btn-sm">Купить</button>
  <button class="btn-primary btn-lg">Смотреть каталог</button>
</div>

<div class="row"><div class="label">Secondary & Ghost</div>
  <button class="btn-secondary">Подробнее</button>
  <button class="btn-ghost">Отмена</button>
  <button class="btn-outline">Сравнить</button>
</div>

<div class="row"><div class="label">Info & Disabled</div>
  <button class="btn-blue">Перейти к оплате</button>
  <button class="btn-disabled" disabled>Нет в наличии</button>
</div>

</body></html>
