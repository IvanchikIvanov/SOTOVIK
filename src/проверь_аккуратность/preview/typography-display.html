<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;padding:24px;font-family:'Unbounded',sans-serif}
.item{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #1e1e1e}
.item:last-child{border-bottom:none;margin-bottom:0}
.label{font-size:10px;font-weight:500;color:#505050;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-family:'Inter',sans-serif}
.hero{font-size:clamp(32px,5vw,56px);font-weight:900;color:#fff;line-height:1.1;letter-spacing:-.03em}
.h1{font-size:clamp(28px,4vw,44px);font-weight:800;color:#fff;line-height:1.1;letter-spacing:-.03em}
.h2{font-size:clamp(22px,3vw,32px);font-weight:700;color:#fff;line-height:1.15;letter-spacing:-.02em}
.h3{font-size:clamp(17px,2vw,22px);font-weight:600;color:#fff;line-height:1.2}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
</style></head><body>
<div class="item"><div class="label">Hero / Display — Unbounded 900</div><div class="hero">ZABERG</div></div>
<div class="item"><div class="label">H1 — Unbounded 800</div><div class="h1">Каталог премиум техники</div></div>
<div class="item"><div class="label">H2 — Unbounded 700</div><div class="h2">Смартфоны и планшеты</div></div>
<div class="item"><div class="label">H3 — Unbounded 600</div><div class="h3">Apple iPhone 16 Pro Max</div></div>
</body></html>
