<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;padding:20px;font-family:'Inter',sans-serif}
.row{display:flex;gap:10px;margin-bottom:10px}
.swatch{border-radius:8px;overflow:hidden;flex:1}
.color{height:80px}
.label{padding:8px 10px;background:#141414;border:1px solid #2a2a2a;border-top:none;border-radius:0 0 8px 8px}
.name{font-size:11px;font-weight:500;color:#a0a0a0;letter-spacing:.04em;text-transform:uppercase}
.val{font-size:12px;color:#505050;margin-top:2px;font-family:monospace}
.dim{height:80px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#a0a0a0;font-weight:600;letter-spacing:.04em}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="color" style="background:#d93caf;border-radius:8px 8px 0 0"></div><div class="label"><div class="name">Magenta</div><div class="val">#d93caf</div></div></div>
  <div class="swatch"><div class="color" style="background:#f060cc;border-radius:8px 8px 0 0"></div><div class="label"><div class="name">Magenta Light</div><div class="val">#f060cc</div></div></div>
  <div class="swatch"><div class="color" style="background:rgba(217,60,175,.15);border-radius:8px 8px 0 0"><div class="dim" style="color:#d93caf">DIM 15%</div></div><div class="label"><div class="name">Magenta Dim</div><div class="val">rgba(217,60,175,.15)</div></div></div>
</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#3a6fd8;border-radius:8px 8px 0 0"></div><div class="label"><div class="name">Blue</div><div class="val">#3a6fd8</div></div></div>
  <div class="swatch"><div class="color" style="background:#5a8ff8;border-radius:8px 8px 0 0"></div><div class="label"><div class="name">Blue Light</div><div class="val">#5a8ff8</div></div></div>
  <div class="swatch"><div class="color" style="background:rgba(58,111,216,.15);border-radius:8px 8px 0 0"><div class="dim" style="color:#5a8ff8">DIM 15%</div></div><div class="label"><div class="name">Blue Dim</div><div class="val">rgba(58,111,216,.15)</div></div></div>
</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#2db55d;border-radius:8px 8px 0 0"></div><div class="label"><div class="name">Green</div><div class="val">#2db55d</div></div></div>
  <div class="swatch"><div class="color" style="background:#3fd572;border-radius:8px 8px 0 0"></div><div class="label"><div class="name">Green Light</div><div class="val">#3fd572</div></div></div>
  <div class="swatch"><div class="color" style="background:rgba(45,181,93,.15);border-radius:8px 8px 0 0"><div class="dim" style="color:#3fd572">DIM 15%</div></div><div class="label"><div class="name">Green Dim</div><div class="val">rgba(45,181,93,.15)</div></div></div>
</div>
</body></html>
