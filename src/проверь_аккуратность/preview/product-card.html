<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;padding:20px;font-family:'Inter',sans-serif;display:flex;gap:14px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;width:200px;overflow:hidden;flex-shrink:0;transition:border-color 200ms,transform 200ms,box-shadow 200ms}
.card:hover{border-color:#3a3a3a;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.thumb{height:160px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;position:relative}
.thumb-inner{width:90px;height:90px;background:#2a2a2a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#505050}
.badge{position:absolute;top:10px;left:10px;background:rgba(45,181,93,.15);color:#3fd572;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:4px}
.badge-new{background:rgba(217,60,175,.15);color:#d93caf}
.body{padding:14px}
.brand{font-size:10px;font-weight:600;color:#505050;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.name{font-size:13px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:6px}
.specs{font-size:11px;color:#505050;font-family:monospace;margin-bottom:10px}
.price{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.02em}
.price-old{font-size:12px;color:#505050;text-decoration:line-through;margin-left:6px}
.actions{display:flex;gap:6px;margin-top:10px}
.btn-cart{flex:1;background:#d93caf;color:#fff;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
.btn-wish{width:34px;height:34px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#505050;font-size:14px;flex-shrink:0}
</style></head><body>

<!-- Default -->
<div class="card">
  <div class="thumb">
    <div class="thumb-inner">📱</div>
    <div class="badge">В наличии</div>
  </div>
  <div class="body">
    <div class="brand">Apple</div>
    <div class="name">iPhone 16 Pro Max 256GB</div>
    <div class="specs">6.9" · 256 GB · 8 GB RAM</div>
    <div style="display:flex;align-items:baseline">
      <div class="price">129 990 ₽</div>
    </div>
    <div class="actions">
      <button class="btn-cart">В корзину</button>
      <div class="btn-wish">♡</div>
    </div>
  </div>
</div>

<!-- Sale -->
<div class="card">
  <div class="thumb">
    <div class="thumb-inner">💻</div>
    <div class="badge badge-new">Новинка</div>
  </div>
  <div class="body">
    <div class="brand">Samsung</div>
    <div class="name">Galaxy S25 Ultra 512GB</div>
    <div class="specs">6.8" · 512 GB · 12 GB RAM</div>
    <div style="display:flex;align-items:baseline;gap:6px">
      <div class="price">109 990 ₽</div>
      <span class="price-old">124 990 ₽</span>
    </div>
    <div class="actions">
      <button class="btn-cart">В корзину</button>
      <div class="btn-wish" style="color:#d93caf;border-color:rgba(217,60,175,.3)">♥</div>
    </div>
  </div>
</div>

<!-- Out of stock -->
<div class="card" style="opacity:.65">
  <div class="thumb">
    <div class="thumb-inner">🎧</div>
    <div class="badge" style="background:rgba(224,60,60,.15);color:#e03c3c">Нет в наличии</div>
  </div>
  <div class="body">
    <div class="brand">Dyson</div>
    <div class="name">Zone Headphones</div>
    <div class="specs">ANC · Bluetooth 5.3</div>
    <div class="price">59 990 ₽</div>
    <div class="actions">
      <button class="btn-cart" style="background:#1e1e1e;color:#505050;cursor:not-allowed">Нет в наличии</button>
      <div class="btn-wish">♡</div>
    </div>
  </div>
</div>

</body></html>
