<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;padding:24px;font-family:'Inter',sans-serif;display:flex;gap:16px;align-items:flex-start}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:20px;flex:1}
.label{font-size:10px;font-weight:500;color:#505050;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.token{font-size:11px;font-family:monospace;color:#505050;margin-top:6px}
</style></head><body>
<div>
  <div class="label">shadow-sm</div>
  <div class="card" style="box-shadow:0 1px 4px rgba(0,0,0,.35)">
    <div style="font-size:13px;color:#a0a0a0">Subtle elevation</div>
    <div class="token">0 1px 4px rgba(0,0,0,.35)</div>
  </div>
</div>
<div>
  <div class="label">shadow-md</div>
  <div class="card" style="box-shadow:0 2px 12px rgba(0,0,0,.45)">
    <div style="font-size:13px;color:#a0a0a0">Cards, panels</div>
    <div class="token">0 2px 12px rgba(0,0,0,.45)</div>
  </div>
</div>
<div>
  <div class="label">shadow-lg</div>
  <div class="card" style="box-shadow:0 8px 32px rgba(0,0,0,.65)">
    <div style="font-size:13px;color:#a0a0a0">Modals, dropdowns</div>
    <div class="token">0 8px 32px rgba(0,0,0,.65)</div>
  </div>
</div>
<div>
  <div class="label">glow-magenta</div>
  <div class="card" style="box-shadow:0 0 20px rgba(217,60,175,.3);border-color:rgba(217,60,175,.35)">
    <div style="font-size:13px;color:#d93caf">CTA highlight</div>
    <div class="token">0 0 20px rgba(217,60,175,.3)</div>
  </div>
</div>
</body></html>
